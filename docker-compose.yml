version: '3.8'

services:
  # ═══════════════════════════════════════════════════════════════
  # INFRASTRUCTURE SERVICES
  # ═══════════════════════════════════════════════════════════════

  redis:
    image: redis:7-alpine
    container_name: plagiarism-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 4gb --maxmemory-policy allkeys-lru
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - plagiarism-network

  postgres:
    image: postgres:15-alpine
    container_name: plagiarism-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: plagiarism
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - plagiarism-network

  minio:
    image: minio/minio:latest
    container_name: plagiarism-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - plagiarism-network

  # ═══════════════════════════════════════════════════════════════
  # APPLICATION SERVICES
  # ═══════════════════════════════════════════════════════════════

  # Backend
  be_cdv:
    build:
      context: ./be_cdv           # ← Đã sửa đúng
      dockerfile: Dockerfile
    container_name: plagiarism_be_cdv
    ports:
      - "8000:8000"
    environment:
      - SECRET_KEY=your-secret-key-change-in-production
      - DEBUG=True
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/plagiarism
      - REDIS_URL=redis://redis:6379
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - MINIO_BUCKET_UPLOADS=plagiarism-uploads
      - MINIO_BUCKET_CORPUS=plagiarism-corpus
      - MINIO_SECURE=False
    volumes:
      - ./be_cdv:/app
      - backend_uploads:/app/uploads
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - plagiarism-network

  # Frontend
  fe_cdv:
    build:
      context: ./fe_cdv           # ← Đã sửa đúng
      dockerfile: Dockerfile
    container_name: plagiarism_fe_cdv
    ports:
      - "3000:80"
    depends_on:
      - be_cdv
    networks:
      - plagiarism-network

  # Corpus Generator
  corpus-init:
    build:
      context: ./be_cdv
      dockerfile: Dockerfile
    container_name: plagiarism-corpus-init
    environment:
      - SECRET_KEY=your-secret-key-change-in-production
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/plagiarism
      - REDIS_URL=redis://redis:6379
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - MINIO_SECURE=False
    command: [ "python", "scripts/generate_corpus.py", "--num-docs", "3000", "--redis-host", "redis" ]
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - plagiarism-network
    profiles:
      - init

volumes:
  redis_data:
    driver: local
  postgres_data:
    driver: local
  minio_data:
    driver: local
  backend_uploads:
    driver: local

networks:
  plagiarism-network:
    name: plagiarism-network
    driver: bridge